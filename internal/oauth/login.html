<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — mcp-banana</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }
    .logo { font-size: 2.5rem; margin-bottom: 0.5rem; }
    h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 0.4rem; }
    .subtitle { font-size: 0.875rem; color: #8b949e; margin-bottom: 2rem; }
    .btn {
      display: block;
      width: 100%;
      padding: 0.65rem 1rem;
      margin-bottom: 0.75rem;
      border: 1px solid #30363d;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 500;
      text-decoration: none;
      color: #e6edf3;
      background: #21262d;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn:hover { background: #30363d; border-color: #8b949e; }
    .btn-google:hover { border-color: #4285f4; }
    .btn-github:hover { border-color: #f0f6fc; }
    .btn-apple:hover  { border-color: #f5f5f7; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🍌</div>
    <h1>mcp-banana</h1>
    <p class="subtitle">Sign in to connect Claude Desktop</p>
    {{range .Providers}}
    <a href="{{.AuthRedirectURL}}" class="btn btn-{{.Name}}">Sign in with {{.DisplayName}}</a>
    {{end}}
  </div>
</body>
</html>
