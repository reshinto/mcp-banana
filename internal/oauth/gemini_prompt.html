<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mcp-banana - Gemini API Key</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            padding: 2rem;
            max-width: 420px;
            width: 100%;
        }
        h1 {
            font-size: 1.4rem;
            margin-top: 0;
            color: #333;
        }
        .identity {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 1.5rem;
        }
        .error {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #b91c1c;
            padding: 0.75rem;
            border-radius: 4px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #333;
        }
        input[type="text"] {
            width: 100%;
            padding: 0.6rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
            box-sizing: border-box;
            margin-bottom: 1rem;
        }
        .actions {
            display: flex;
            gap: 0.75rem;
        }
        button {
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
        }
        .btn-primary {
            background: #2563eb;
            color: white;
        }
        .btn-primary:hover {
            background: #1d4ed8;
        }
        .btn-secondary {
            background: #e5e7eb;
            color: #333;
        }
        .btn-secondary:hover {
            background: #d1d5db;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>mcp-banana</h1>
        <p class="identity">Signed in as <strong>{{.Identity}}</strong></p>

        {{if .Error}}
        <div class="error">{{.Error}}</div>
        {{end}}

        <form method="POST" action="/gemini-key">
            <input type="hidden" name="session_token" value="{{.SessionToken}}">
            <label for="gemini_api_key">Gemini API Key</label>
            <input type="text" id="gemini_api_key" name="gemini_api_key" placeholder="Enter your Gemini API key" autocomplete="off">
            <div class="actions">
                <button type="submit" name="action" value="save" class="btn-primary">Save Key</button>
                {{if .IsReturning}}
                <button type="submit" name="action" value="skip" class="btn-secondary">Skip</button>
                {{end}}
            </div>
        </form>
    </div>
</body>
</html>
