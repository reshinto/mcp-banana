name: CD

on:
  push:
    branches: [main]

permissions:
  contents: read

# Ensure only one deployment runs at a time.
# cancel-in-progress: false means a queued deploy waits for the current one to finish.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # CI must pass first -- reuse ci.yml via workflow_call
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy to DigitalOcean
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production

    steps:
      # Guard: block deployment if sentinel model IDs are still present.
      # This runs on the GitHub runner (not the droplet) before any SSH.
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Block deploy if model IDs unverified
        run: |
          if grep -q "VERIFY_MODEL_ID_BEFORE_RELEASE" internal/gemini/registry.go; then
            echo "DEPLOYMENT BLOCKED: Sentinel model IDs still present in registry."
            echo "Replace all VERIFY_MODEL_ID_BEFORE_RELEASE values with verified Gemini model IDs before deploying."
            exit 1
          fi

      # Deploy to the DigitalOcean droplet via SSH.
      #
      # Prerequisites (one-time manual setup on the droplet):
      #   1. Clone the repo: git clone https://github.com/reshinto/mcp-banana.git /opt/mcp-banana
      #   2. Create .env: cp /opt/mcp-banana/.env.example /opt/mcp-banana/.env && nano /opt/mcp-banana/.env
      #   3. Install Docker: apt-get install -y docker.io docker-compose-plugin
      #   4. Ensure the deploy user can run docker: usermod -aG docker <deploy-user>
      #
      # The script handles both the initial deploy and subsequent deploys.
      # script_stop is false so the script can run its own error handling and rollback.
      - name: Deploy, verify, and auto-rollback on failure
        uses: appleboy/ssh-action@2ead5e36573ebcdced20eb94e652a0a18e2e5745 # v1.2.2
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: false
          script: |
            set -uo pipefail

            DEPLOY_DIR="/opt/mcp-banana"
            REPO_URL="https://github.com/reshinto/mcp-banana.git"

            # ---- First-time setup: clone if the repo does not exist yet ----
            if [ ! -d "$DEPLOY_DIR/.git" ]; then
              echo "First deploy: cloning repository..."
              git clone "$REPO_URL" "$DEPLOY_DIR"
            fi

            cd "$DEPLOY_DIR"

            # Verify .env exists (must be created manually on the droplet)
            if [ ! -f .env ]; then
              echo "ERROR: .env file not found at $DEPLOY_DIR/.env"
              echo "Create it from .env.example and fill in GEMINI_API_KEY and MCP_AUTH_TOKEN:"
              echo "  cp .env.example .env && nano .env"
              exit 1
            fi

            PREV_SHA=$(git rev-parse HEAD)
            echo "Current SHA: $PREV_SHA"

            # Rollback function: revert to previous commit and rebuild
            rollback() {
              echo "Auto-rolling back to $PREV_SHA..."
              git checkout "$PREV_SHA" -- . 2>/dev/null || git reset --hard "$PREV_SHA"
              docker compose up -d --build --force-recreate 2>/dev/null || true
              sleep 10
              if curl -sf http://127.0.0.1:8847/healthz > /dev/null 2>&1; then
                echo "Rollback successful -- server is back on $PREV_SHA"
              else
                echo "WARNING: Rollback container also failed. Manual intervention required."
              fi
              echo "Deployment of $NEW_SHA failed. Server is running $PREV_SHA."
            }

            # ---- Pull latest code ----
            echo "Fetching latest code from origin/main..."
            if ! git fetch origin main; then
              echo "git fetch failed -- check that the droplet can reach GitHub"
              NEW_SHA="(fetch failed)"
              rollback
              exit 1
            fi

            if ! git reset --hard origin/main; then
              echo "git reset failed"
              NEW_SHA="(reset failed)"
              rollback
              exit 1
            fi

            NEW_SHA=$(git rev-parse HEAD)
            echo "New SHA: $NEW_SHA"

            if [ "$NEW_SHA" = "$PREV_SHA" ]; then
              echo "No new commits to deploy. Skipping rebuild."
              exit 0
            fi

            # ---- Build and restart ----
            echo "Building and starting new container..."
            if ! docker compose up -d --build --force-recreate; then
              echo "docker compose build/start failed"
              rollback
              exit 1
            fi

            # ---- Health check: 6 attempts, 5 seconds apart (30s total) ----
            echo "Waiting for health check (30s max)..."
            for attempt in 1 2 3 4 5 6; do
              HEALTH_RESPONSE=$(curl -sf http://127.0.0.1:8847/healthz 2>/dev/null || echo "")
              if [ "$HEALTH_RESPONSE" = '{"status":"ok"}' ]; then
                echo "Deploy successful! Health check passed on attempt $attempt"
                echo "Cleaning up old Docker images..."
                docker image prune -f 2>/dev/null || true
                exit 0
              fi
              echo "Attempt $attempt: not ready, waiting 5s..."
              sleep 5
            done

            echo "Health check FAILED after 30 seconds!"
            rollback
            exit 1
